{% extends "base.html" %}
{% block title %}创建优惠券{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
  <h1 class="text-2xl font-bold text-highlight mb-6">创建优惠券</h1>

  <form method="POST" class="bg-surface rounded-xl p-6 space-y-4">
    <div>
      <label for="code" class="block text-textlight text-sm font-medium mb-1">优惠码</label>
      <input type="text" id="code" name="code" required class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight" placeholder="如 SAVE20">
    </div>
    <div>
      <label for="discount_percent" class="block text-textlight text-sm font-medium mb-1">折扣比例 (1-100)%</label>
      <input type="number" id="discount_percent" name="discount_percent" required min="1" max="100" value="20" class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight">
    </div>
    <div>
      <label for="valid_from" class="block text-textlight text-sm font-medium mb-1">生效日期</label>
      <input type="date" id="valid_from" name="valid_from" class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight">
    </div>
    <div>
      <label for="valid_until" class="block text-textlight text-sm font-medium mb-1">失效日期</label>
      <input type="date" id="valid_until" name="valid_until" required class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight">
    </div>
    <div class="flex gap-4">
      <button type="submit" class="px-6 py-2 rounded-lg bg-highlight text-white font-medium hover:bg-blue-700 transition">创建</button>
      <a href="{{ url_for('admin_vouchers') }}" class="px-6 py-2 rounded-lg bg-soft text-textlight font-medium hover:bg-gray-600 transition">返回</a>
    </div>
  </form>
</div>
{% endblock %}
