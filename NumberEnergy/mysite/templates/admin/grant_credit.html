{% extends "base.html" %}
{% block title %}{{ t('admin_topup_title') }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
  <h1 class="text-2xl font-bold text-highlight mb-6">{{ t('admin_topup_heading') }}</h1>
  <p class="text-soft text-sm mb-4">{{ t('admin_topup_description') }}</p>

  <form method="POST" class="bg-surface rounded-xl p-6 space-y-4">
    <div>
      <label for="email" class="block text-textlight text-sm font-medium mb-1">{{ t('admin_topup_email_label') }}</label>
      <input type="email" id="email" name="email" required class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight" placeholder="user@example.com">
    </div>
    <div>
      <label for="credits" class="block text-textlight text-sm font-medium mb-1">{{ t('admin_topup_credits_label') }}</label>
      <input type="number" id="credits" name="credits" required min="1" class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight" placeholder="50">
    </div>
    <div class="flex gap-4">
      <button type="submit" class="px-6 py-2 rounded-lg bg-amber-600 text-white font-medium hover:bg-amber-700 transition">{{ t('admin_topup_btn') }}</button>
      <a href="{{ url_for('admin_dashboard') }}" class="px-6 py-2 rounded-lg bg-soft text-textlight font-medium hover:bg-gray-600 transition">{{ t('admin_back') }}</a>
    </div>
  </form>
</div>
{% endblock %}
