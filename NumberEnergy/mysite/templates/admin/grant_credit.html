{% extends "base.html" %}
{% block title %}充值余额{% endblock %}

{% block content %}
<div class="max-w-md mx-auto py-8 px-4">
  <h1 class="text-2xl font-bold text-highlight mb-6">为用户充值余额</h1>

  <form method="POST" class="bg-surface rounded-xl p-6 space-y-4">
    <div>
      <label for="email" class="block text-textlight text-sm font-medium mb-1">用户邮箱</label>
      <input type="email" id="email" name="email" required class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight" placeholder="user@example.com">
    </div>
    <div>
      <label for="amount_cents" class="block text-textlight text-sm font-medium mb-1">金额（分，如 500 = RM5.00）</label>
      <input type="number" id="amount_cents" name="amount_cents" required min="1" class="w-full px-4 py-2 rounded-lg bg-dark border border-soft text-textlight focus:ring-2 focus:ring-highlight" placeholder="500">
    </div>
    <div class="flex gap-4">
      <button type="submit" class="px-6 py-2 rounded-lg bg-amber-600 text-white font-medium hover:bg-amber-700 transition">充值</button>
      <a href="{{ url_for('admin_dashboard') }}" class="px-6 py-2 rounded-lg bg-soft text-textlight font-medium hover:bg-gray-600 transition">返回</a>
    </div>
  </form>
</div>
{% endblock %}
