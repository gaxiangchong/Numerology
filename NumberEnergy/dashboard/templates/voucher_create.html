{% extends "base.html" %}
{% block title %}Create voucher{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-blue-400 mb-6">Create voucher</h1>
<form method="POST" class="bg-gray-800 rounded-xl p-6 max-w-md space-y-4">
  <div>
    <label for="code" class="block text-sm text-gray-300 mb-1">Code</label>
    <input type="text" name="code" id="code" required class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white uppercase" placeholder="PROMO20">
  </div>
  <div>
    <label for="discount_percent" class="block text-sm text-gray-300 mb-1">Discount % (1–100)</label>
    <input type="number" name="discount_percent" id="discount_percent" required min="1" max="100" value="20" class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white">
  </div>
  <div>
    <label for="valid_from" class="block text-sm text-gray-300 mb-1">Valid from (YYYY-MM-DD)</label>
    <input type="date" name="valid_from" id="valid_from" class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white">
  </div>
  <div>
    <label for="valid_until" class="block text-sm text-gray-300 mb-1">Valid until (YYYY-MM-DD)</label>
    <input type="date" name="valid_until" id="valid_until" class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white">
  </div>
  <div class="flex gap-4">
    <button type="submit" class="px-6 py-2 rounded-lg bg-green-600 text-white font-medium hover:bg-green-700">Create</button>
    <a href="{{ url_for('vouchers_list') }}" class="px-6 py-2 rounded-lg bg-gray-600 text-white font-medium hover:bg-gray-500">Back</a>
  </div>
</form>
{% endblock %}
