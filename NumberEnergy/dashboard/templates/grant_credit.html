{% extends "base.html" %}
{% block title %}Top up credits{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-amber-400 mb-6">Top up account credits</h1>
<p class="text-gray-400 text-sm mb-4">Add usage credits to a user's account (for number analysis, AI, lucky number). Not store balance (RM).</p>
<form method="POST" class="bg-gray-800 rounded-xl p-6 max-w-md space-y-4">
  <div>
    <label for="email" class="block text-sm text-gray-300 mb-1">User email</label>
    <input type="email" name="email" id="email" required class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white" placeholder="user@example.com">
  </div>
  <div>
    <label for="credits" class="block text-sm text-gray-300 mb-1">Credits to add</label>
    <input type="number" name="credits" id="credits" required min="1" class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white" placeholder="50">
  </div>
  <div class="flex gap-4">
    <button type="submit" class="px-6 py-2 rounded-lg bg-amber-600 text-white font-medium hover:bg-amber-700">Top up</button>
    <a href="{{ url_for('dashboard_home') }}" class="px-6 py-2 rounded-lg bg-gray-600 text-white font-medium hover:bg-gray-500">Back</a>
  </div>
</form>
{% endblock %}
