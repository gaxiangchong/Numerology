{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="max-w-md mx-auto py-12">
  <h1 class="text-2xl font-bold text-blue-400 mb-6 text-center">Dashboard login</h1>
  <form method="POST" class="bg-gray-800 rounded-xl p-6 space-y-4">
    <div>
      <label for="email" class="block text-sm text-gray-300 mb-1">Email</label>
      <input type="email" name="email" id="email" required class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500">
    </div>
    <div>
      <label for="password" class="block text-sm text-gray-300 mb-1">Password</label>
      <input type="password" name="password" id="password" required class="w-full px-4 py-3 rounded-lg bg-gray-900 border border-gray-600 text-white focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-medium">Log in</button>
  </form>
  <p class="text-center text-gray-500 text-sm mt-4">Use your dashboard admin account (separate from main app).</p>
</div>
{% endblock %}
